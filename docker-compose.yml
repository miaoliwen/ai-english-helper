services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:80/", "-O", "/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "3001"
    env_file: ./server/.env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - CORS_ORIGIN=http://localhost
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3001/health", "-O", "/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
